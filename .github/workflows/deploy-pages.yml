name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          for file in \
            app.js \
            strategy-gallery.js \
            controller-shell.js \
            training-data.js \
            training-engine.js \
            training-integration.js \
            training-delight.js \
            followups-data.js \
            followups-engine.js \
            data-core.js \
            situations.js \
            data-{1..6}.js; do
            node --check "$file"
          done

      - name: Validate move and situation data
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const context = { window: {} };
          vm.createContext(context);
          for (const file of ['data-core.js', 'situations.js', 'data-1.js', 'data-2.js', 'data-3.js', 'data-4.js', 'data-5.js', 'data-6.js']) {
            vm.runInContext(fs.readFileSync(file, 'utf8'), context, { filename: file });
          }
          const data = context.window.MARISA_DATA;
          const moveIds = new Set(data.moves.map(move => move.id));
          const situations = data.situationGroups.flatMap(group => group.situations);
          if (data.moves.length !== 48) throw new Error(`Expected 48 moves, got ${data.moves.length}`);
          if (moveIds.size !== 48) throw new Error('Move IDs must be unique');
          if (!data.firstSix.every(id => moveIds.has(id))) throw new Error('FIRST 6 contains an unknown move');
          if (data.situationGroups.length !== 8) throw new Error(`Expected 8 situation groups, got ${data.situationGroups.length}`);
          if (situations.length !== 40) throw new Error(`Expected 40 situations, got ${situations.length}`);
          if (new Set(situations.map(item => item.id)).size !== 40) throw new Error('Situation IDs must be unique');
          const unknownRefs = situations.flatMap(item => item.moves.filter(id => !moveIds.has(id)).map(id => `${item.id}:${id}`));
          if (unknownRefs.length) throw new Error(`Unknown move references: ${unknownRefs.join(', ')}`);
          console.log(`Validated ${data.moves.length} moves and ${situations.length} situations.`);
          NODE

      - name: Validate follow-up recommendations
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const context = { window: {} };
          vm.createContext(context);
          for (const file of ['data-core.js', 'data-1.js', 'data-2.js', 'data-3.js', 'data-4.js', 'data-5.js', 'data-6.js', 'followups-data.js']) {
            vm.runInContext(fs.readFileSync(file, 'utf8'), context, { filename: file });
          }
          const moves = context.window.MARISA_DATA.moves;
          const followups = context.window.MARISA_FOLLOWUPS;
          if (!followups) throw new Error('MARISA_FOLLOWUPS was not created');
          if (followups.version !== '0.11.0') throw new Error(`Unexpected follow-up version: ${followups.version}`);
          const actual = new Set(moves.map(move => move.id));
          const declared = new Set(followups.allMoveIds);
          const missing = [...actual].filter(id => !declared.has(id));
          const unknown = [...declared].filter(id => !actual.has(id));
          if (moves.length !== 48 || declared.size !== 48) throw new Error(`Expected 48 covered moves, got actual=${moves.length}, declared=${declared.size}`);
          if (missing.length || unknown.length) throw new Error(`Coverage mismatch. Missing: ${missing.join(', ')} Unknown: ${unknown.join(', ')}`);
          const validConditions = new Set(followups.conditions.map(item => item.id));
          if (validConditions.size !== 4 || !['normal','counter','punish','rush'].every(id => validConditions.has(id))) {
            throw new Error('Expected normal/counter/punish/rush conditions');
          }
          const sourceIds = new Set(Object.keys(followups.sources));
          for (const [moveId, conditions] of Object.entries(followups.overrides)) {
            if (!actual.has(moveId)) throw new Error(`Override references unknown move: ${moveId}`);
            for (const [conditionId, recommendations] of Object.entries(conditions)) {
              if (!validConditions.has(conditionId)) throw new Error(`Unknown condition ${moveId}:${conditionId}`);
              if (!Array.isArray(recommendations) || recommendations.length < 1 || recommendations.length > 3) {
                throw new Error(`Recommendations must contain 1-3 entries: ${moveId}:${conditionId}`);
              }
              for (const recommendation of recommendations) {
                if (!recommendation.route || !recommendation.rank) throw new Error(`Incomplete recommendation: ${moveId}:${conditionId}`);
                const badSources = (recommendation.sources || []).filter(id => !sourceIds.has(id));
                if (badSources.length) throw new Error(`Unknown sources ${moveId}:${conditionId}: ${badSources.join(', ')}`);
              }
            }
          }
          const noFallback = moves.filter(move => !followups.overrides[move.id]?.normal && (!Array.isArray(move.follow) || !move.follow.length));
          if (noFallback.length) throw new Error(`Moves without normal recommendations or fallback: ${noFallback.map(move => move.id).join(', ')}`);
          console.log(`Validated follow-ups for all ${moves.length} Modern Marisa moves with ${Object.keys(followups.overrides).length} curated starters.`);
          NODE

      - name: Validate training data
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const context = { window: {} };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('training-data.js', 'utf8'), context, { filename: 'training-data.js' });
          const data = context.window.MARISA_TRAINING;
          if (!data) throw new Error('MARISA_TRAINING was not created');
          if (data.skills.length !== 6) throw new Error(`Expected 6 skills, got ${data.skills.length}`);
          if (data.drills.length !== 6) throw new Error(`Expected 6 drills, got ${data.drills.length}`);
          if (new Set(data.skills.map(item => item.id)).size !== data.skills.length) throw new Error('Skill IDs must be unique');
          if (new Set(data.drills.map(item => item.id)).size !== data.drills.length) throw new Error('Drill IDs must be unique');
          const skillIds = new Set(data.skills.map(item => item.id));
          const drillIds = new Set(data.drills.map(item => item.id));
          for (const skill of data.skills) {
            if (!drillIds.has(skill.drillId)) throw new Error(`Unknown drill for skill ${skill.id}: ${skill.drillId}`);
          }
          for (const drill of data.drills) {
            if (!skillIds.has(drill.skillId)) throw new Error(`Unknown skill for drill ${drill.id}: ${drill.skillId}`);
            const promptIds = new Set(drill.prompts.map(item => item.id));
            if (promptIds.size !== drill.prompts.length) throw new Error(`Duplicate prompt ID in ${drill.id}`);
            for (const id of drill.choicePromptIds) {
              if (!promptIds.has(id)) throw new Error(`Unknown choice prompt ${id} in ${drill.id}`);
            }
            for (const prompt of drill.prompts) {
              if (!['action', 'assist', 'impact', 'wait'].includes(prompt.expected.kind)) {
                throw new Error(`Unknown expected kind in ${drill.id}:${prompt.id}`);
              }
            }
          }
          console.log(`Validated ${data.skills.length} skills, ${data.drills.length} drills, and ${data.drills.flatMap(item => item.prompts).length} prompts.`);
          NODE

      - name: Validate published experience
        run: |
          test -s mobile-experience.css
          test -s mobile-answer-buttons.css
          test -s mobile-control-buttons.css
          test -s training-delight.css
          test -s training-delight.js
          test -s followups.css
          test -s followups-data.js
          test -s followups-engine.js
          grep -q 'followups.css?v=0.11.0' strategy-gallery.css
          grep -q 'followups-data.js?v=0.11.0' index.html
          grep -q 'followups-engine.js?v=0.11.0' index.html
          grep -q 'strategy-gallery.css?v=0.11.0' index.html
          grep -q 'training-integration.js?v=0.11.0' index.html
          grep -q 'training-delight.js?v=0.11.0' index.html
          grep -q 'data-followup-tab' followups-engine.js
          grep -q 'followup-recommendation-grid' followups-engine.js
          node -e "const fs=require('fs'); for(const file of ['mobile-experience.css','mobile-answer-buttons.css','mobile-control-buttons.css','training-delight.css','followups.css']){const css=fs.readFileSync(file,'utf8'); if((css.match(/{/g)||[]).length !== (css.match(/}/g)||[]).length) throw new Error('Unbalanced CSS braces: '+file);}"
          node -e "const fs=require('fs'); const value=JSON.parse(fs.readFileSync('version.json','utf8')); if(value.appVersion!=='0.11.0'||value.followupDataVersion!=='0.11.0') throw new Error('Unexpected app version');"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
